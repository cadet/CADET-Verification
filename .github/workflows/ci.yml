name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      docker_image:
        description: "Docker image to use for the verification job"
        required: false
        default: "ghcr.io/cadet/cadet-suite:master"
      branch:
        description: "Branch or commit SHA to test (only used in manual dispatch)"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: ${{ github.event.inputs.docker_image || 'ghcr.io/cadet/cadet-suite:master' }}
      COMMIT_SHA: ${{ github.event.inputs.branch || github.event.pull_request.head.sha || github.sha }}
      REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      TEST_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      PYTEST_ARGS: ""

    steps:
      - name: Checkout (for Codecov upload context)
        uses: actions/checkout@v4

      - name: Run tests in Docker (with coverage)
        run: |
          docker pull "$DOCKER_IMAGE"

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e REPOSITORY="$REPOSITORY" \
            -e COMMIT_SHA="$COMMIT_SHA" \
            -e TEST_BRANCH="$TEST_BRANCH" \
            "$DOCKER_IMAGE" \
            bash -c "
              set -e

              echo 'Cloning CADET-Verification'
              git clone https://github.com/$REPOSITORY.git .
              git checkout $COMMIT_SHA

              echo 'Installing Python dependencies + coverage tooling'
              pip install . pytest pytest-cov

              echo 'Running unit tests with coverage'
              pytest test/ \
                --cov=. \
                --cov-report=xml:/workspace/coverage.xml

              echo 'Running integration tests'
              pytest -s $PYTEST_ARGS scripts/verify_cadet-core.py --branch-name=$TEST_BRANCH
            "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true