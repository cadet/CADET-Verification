name: Verify Radial DG

on:
  workflow_dispatch:
    inputs:
      cadet_core_repo:
        description: "CADET-Core repo (owner/name)"
        required: true
        default: "Yuvraj2710/CADET-Core"
      cadet_core_branch:
        description: "CADET-Core branch to build"
        required: true
        default: "DGRadialFeature-backup2"
      small_test:
        description: "Run small test only"
        required: true
        default: "true"
      studies:
        description: "Studies to run (comma-separated, e.g. '0,1,2,3' or 'all')"
        required: true
        default: "all"

jobs:
  build-cadet:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    env:
      CADET_SRC: ${{ github.workspace }}/cadet-core
      CADET_BUILD: ${{ github.workspace }}/cadet-build
      CADET_INSTALL: ${{ github.workspace }}/cadet-install

    steps:
      - name: Checkout CADET-Core
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.cadet_core_repo }}
          ref: ${{ github.event.inputs.cadet_core_branch }}
          submodules: true
          path: cadet-core

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-14 g++-14 \
            libhdf5-dev \
            liblapack-dev \
            libblas-dev \
            libtbb-dev \
            libsuperlu-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 60

      - name: Build Eigen
        run: |
          git clone https://gitlab.com/libeigen/eigen.git
          cd eigen
          git fetch origin
          git checkout --detach origin/5.0
          cmake -S . -B build \
            -DCMAKE_INSTALL_PREFIX="${CADET_INSTALL}" \
            -DEIGEN_BUILD_BLAS=OFF \
            -DEIGEN_BUILD_LAPACK=OFF \
            -DBUILD_TESTING=OFF
          cmake --install build

      - name: Build CADET-Core
        run: |
          cmake -E make_directory "${CADET_BUILD}"
          cmake -E make_directory "${CADET_INSTALL}"
          cd "${CADET_BUILD}"
          cmake \
            -DCMAKE_INSTALL_PREFIX="${CADET_INSTALL}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEIGEN3_DIR="${CADET_INSTALL}/eigen" \
            "${CADET_SRC}" \
            -DENABLE_TESTS=OFF
          make install -j$(nproc)

      - name: Verify CADET binary
        run: |
          export LD_LIBRARY_PATH=${CADET_INSTALL}/lib:$LD_LIBRARY_PATH
          ${CADET_INSTALL}/bin/cadet-cli --version

      - name: Upload CADET install
        uses: actions/upload-artifact@v4
        with:
          name: cadet-install
          path: cadet-install/
          retention-days: 1

  # Studies 0, 1, 3 — one job each
  run-study:
    needs: build-cadet
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - { study: 0, name: "study-0", extra_args: "" }
          - { study: 1, name: "study-1", extra_args: "" }
          - { study: 3, name: "study-3-D1e4", extra_args: ", study3_dispersions=[0]" }
          - { study: 3, name: "study-3-D1e5", extra_args: ", study3_dispersions=[1]" }
    defaults:
      run:
        shell: bash -l {0}
    env:
      CADET_INSTALL: ${{ github.workspace }}/cadet-install
      VERIFICATION_DIR: ${{ github.workspace }}/verification

    steps:
      - name: Check if study should run
        id: check
        run: |
          STUDIES="${{ github.event.inputs.studies }}"
          STUDY=${{ matrix.study }}
          if [ "$STUDIES" = "all" ] || echo "$STUDIES" | grep -qw "$STUDY"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout CADET-Verification
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          path: verification

      - name: Download CADET install
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: cadet-install
          path: cadet-install/

      - name: Install runtime libraries
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libtbb-dev libsuperlu-dev

      - name: Fix permissions
        if: steps.check.outputs.skip == 'false'
        run: chmod +x ${CADET_INSTALL}/bin/cadet-cli

      - name: Install Python dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          pip install numpy scipy matplotlib h5py addict joblib cadet-python pytest pandas

      - name: Run Study ${{ matrix.study }}
        if: steps.check.outputs.skip == 'false'
        run: |
          cd "${VERIFICATION_DIR}"
          export LD_LIBRARY_PATH=${CADET_INSTALL}/lib:$LD_LIBRARY_PATH
          export PATH=${CADET_INSTALL}/bin:$PATH
          python -c "
          import sys
          sys.path.insert(0, '.')
          from pathlib import Path
          import src.radialDG as radialDG

          small_test = ${{ github.event.inputs.small_test == 'true' && 'True' || 'False' }}
          output_path = Path.cwd() / 'output' / 'test_cadet-core' / 'radialDG'

          radialDG.radialDG_tests(
              n_jobs=-1,
              small_test=small_test,
              output_path=str(output_path),
              cadet_path='${CADET_INSTALL}',
              studies=[${{ matrix.study }}]${{ matrix.extra_args }}
          )
          print('Study ${{ matrix.study }} complete!')
          "

      - name: Upload results
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: radialDG-results-${{ matrix.name }}
          path: verification/output/test_cadet-core/radialDG/
          retention-days: 30

  # Study 2 — split into 6 parallel jobs (one per config)
  # 0: GRM lin, 1: GRM SMA, 2: LRM lin, 3: LRM SMA, 4: LRMP lin, 5: LRMP SMA
  run-study2:
    needs: build-cadet
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        config:
          - { id: 0, name: "GRM-lin-DG", methods: "['DG']" }
          - { id: 0, name: "GRM-lin-FV", methods: "['FV']" }
          - { id: 1, name: "GRM-SMA-DG", methods: "['DG']" }
          - { id: 1, name: "GRM-SMA-FV", methods: "['FV']" }
          - { id: 2, name: "LRM-lin-DG", methods: "['DG']" }
          - { id: 2, name: "LRM-lin-FV", methods: "['FV']" }
          - { id: 3, name: "LRM-SMA-DG", methods: "['DG']" }
          - { id: 3, name: "LRM-SMA-FV", methods: "['FV']" }
          - { id: 4, name: "LRMP-lin-DG", methods: "['DG']" }
          - { id: 4, name: "LRMP-lin-FV", methods: "['FV']" }
          - { id: 5, name: "LRMP-SMA-DG", methods: "['DG']" }
          - { id: 5, name: "LRMP-SMA-FV", methods: "['FV']" }
    defaults:
      run:
        shell: bash -l {0}
    env:
      CADET_INSTALL: ${{ github.workspace }}/cadet-install
      VERIFICATION_DIR: ${{ github.workspace }}/verification

    steps:
      - name: Check if study 2 should run
        id: check
        run: |
          STUDIES="${{ github.event.inputs.studies }}"
          if [ "$STUDIES" = "all" ] || echo "$STUDIES" | grep -qw "2"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout CADET-Verification
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          path: verification

      - name: Download CADET install
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: cadet-install
          path: cadet-install/

      - name: Install runtime libraries
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libtbb-dev libsuperlu-dev

      - name: Fix permissions
        if: steps.check.outputs.skip == 'false'
        run: chmod +x ${CADET_INSTALL}/bin/cadet-cli

      - name: Install Python dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          pip install numpy scipy matplotlib h5py addict joblib cadet-python pytest pandas

      - name: Run Study 2 config ${{ matrix.config.name }}
        if: steps.check.outputs.skip == 'false'
        run: |
          cd "${VERIFICATION_DIR}"
          export LD_LIBRARY_PATH=${CADET_INSTALL}/lib:$LD_LIBRARY_PATH
          export PATH=${CADET_INSTALL}/bin:$PATH
          python -c "
          import sys
          sys.path.insert(0, '.')
          from pathlib import Path
          import src.radialDG as radialDG

          small_test = ${{ github.event.inputs.small_test == 'true' && 'True' || 'False' }}
          output_path = Path.cwd() / 'output' / 'test_cadet-core' / 'radialDG'

          radialDG.radialDG_tests(
              n_jobs=-1,
              small_test=small_test,
              output_path=str(output_path),
              cadet_path='${CADET_INSTALL}',
              studies=[2],
              study2_configs=[${{ matrix.config.id }}],
              study2_methods=${{ matrix.config.methods }}
          )
          print('Study 2 config ${{ matrix.config.name }} complete!')
          "

      - name: Upload results
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: radialDG-results-study2-${{ matrix.config.name }}
          path: verification/output/test_cadet-core/radialDG/
          retention-days: 30

  merge-results:
    needs: [run-study, run-study2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: radialDG-results-*
          path: merged-results
          merge-multiple: true

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: radialDG-results
          path: merged-results/
          retention-days: 30
